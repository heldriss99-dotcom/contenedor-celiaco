services:

  database:
    image: postgis/postgis:15-3.3
    container_name: celiaco_db
    restart: always
    environment:
      POSTGRES_DB: celiaco
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - celiaco_net

  api:
    build: ./api
    container_name: celiaco_api
    restart: always
    depends_on:
      - database
    ports:
      - "8000:8000"
    environment:
      DB_HOST: database
      DB_NAME: celiaco
      DB_USER: user
      DB_PASSWORD: password
      DB_PORT: 5432
    networks:
      - celiaco_net

  web:
    image: nginx:alpine
    container_name: celiaco_web
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - celiaco_net

volumes:
  db_data:

networks:
  celiaco_net: